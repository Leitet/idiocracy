<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>When Idiocracy — OG card</title>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;700;900&family=Archivo+Black&family=Bungee&family=Bungee+Inline&display=swap"
        rel="stylesheet">
  <style>
    html, body { margin: 0; padding: 0; }
    body {
      width: 1200px; height: 630px; overflow: hidden;
      background:
        radial-gradient(circle at 20% 20%, rgba(199,255,31,0.18), transparent 45%),
        radial-gradient(circle at 80% 70%, rgba(25,230,255,0.12), transparent 40%),
        linear-gradient(180deg, #0c1013 0%, #0a0d0f 100%);
      font-family: 'Archivo', sans-serif;
      color: #f5efe0;
      position: relative;
    }
    /* scanlines */
    body::before {
      content: "";
      position: absolute; inset: 0;
      background: repeating-linear-gradient(to bottom,
        rgba(0,0,0,0) 0, rgba(0,0,0,0) 3px,
        rgba(0,0,0,0.18) 4px, rgba(0,0,0,0) 5px);
      pointer-events: none;
    }
    .hazard {
      height: 26px;
      background: repeating-linear-gradient(135deg,
        #ffd400 0 28px, #0a0d0f 28px 56px);
    }
    .wrap {
      position: relative;
      height: calc(630px - 52px);
      display: grid;
      grid-template-columns: 1.1fr 1fr;
      gap: 40px;
      padding: 46px 60px;
      align-items: center;
    }
    .title {
      font-family: 'Bungee', sans-serif;
      font-size: 104px;
      line-height: 0.92;
      letter-spacing: -0.02em;
      text-shadow: 4px 4px 0 #ff2a2a, 8px 8px 0 #0a0d0f;
    }
    .title .when { color: #ffd400; }
    .title .idio { color: #c7ff1f; text-shadow: 4px 4px 0 #ff2a2a, 8px 8px 0 #0a0d0f, 0 0 22px rgba(199,255,31,0.55); }

    .tagline {
      margin-top: 20px;
      font-family: 'Bungee Inline', sans-serif;
      font-size: 22px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #f5efe0;
    }
    .stamp {
      display: inline-block;
      margin-top: 28px;
      padding: 5px 14px;
      border: 2px solid #c7ff1f;
      color: #c7ff1f;
      font-family: 'Bungee', sans-serif;
      font-size: 14px;
      letter-spacing: 0.3em;
      text-shadow: 0 0 8px rgba(199,255,31,0.4);
    }

    .gauge {
      border: 4px solid #c7ff1f;
      background: linear-gradient(180deg, rgba(199,255,31,0.10), rgba(199,255,31,0.02));
      border-radius: 8px;
      padding: 34px 30px 36px;
      text-align: center;
      box-shadow: 0 0 40px rgba(199,255,31,0.45),
                  inset 0 0 80px rgba(199,255,31,0.10);
      position: relative;
    }
    .gauge .cap {
      position: absolute; top: -16px; left: 26px;
      background: #0a0d0f; color: #c7ff1f;
      padding: 0 12px;
      font-family: 'Bungee', sans-serif;
      font-size: 14px;
      letter-spacing: 0.25em;
    }
    .gauge .big {
      font-family: 'Bungee', sans-serif;
      font-size: 220px;
      line-height: 1;
      color: #c7ff1f;
      text-shadow: 0 0 22px rgba(199,255,31,0.6);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 6px;
    }
    .gauge .big .pct {
      font-size: 0.42em;
      color: #ffd400;
      margin-bottom: 0.15em;
    }
    .gauge .label {
      font-family: 'Bungee Inline', sans-serif;
      letter-spacing: 0.2em;
      font-size: 18px;
      margin-top: 14px;
    }
    .gauge .verdict {
      margin-top: 14px;
      color: #ffd400;
      font-weight: 700;
      font-size: 17px;
    }
  </style>
</head>
<body>
  <div class="hazard"></div>
  <main class="wrap">
    <section>
      <div class="title">
        <div><span class="when">WHEN</span></div>
        <div><span class="idio">IDIOCRACY</span></div>
      </div>
      <div class="tagline">A LIVE SCORE OF HUMANITY VS. THE MOVIE</div>
      <div class="stamp">ELECTROLYTE-CERTIFIED · 2026</div>
    </section>
    <section class="gauge">
      <span class="cap">OFFICIAL INDEX</span>
      <div class="big"><span id="score">--</span><span class="pct">%</span></div>
      <div class="label">IDIOCRACY PROXIMITY</div>
      <div class="verdict" id="verdict">—</div>
    </section>
  </main>
  <div class="hazard"></div>

  <script src="data.js"></script>
  <script>
    function scoreFor(t) { return Math.max(...t.stars.map(s => s.pct)); }
    function verdictFor(total) {
      if (total < 20) return "Optimistic. Maybe we make it.";
      if (total < 40) return "Warming up. Keep an eye on things.";
      if (total < 60) return "We are past the opening montage.";
      if (total < 75) return "Brawndo is being considered for agriculture.";
      if (total < 90) return "Costco is building its law school.";
      return "Welcome to Costco. I love you.";
    }
    const total = Math.round(TELLS.reduce((s,t)=>s+scoreFor(t),0) / TELLS.length);
    document.getElementById('score').textContent = total;
    document.getElementById('verdict').textContent = verdictFor(total);
    document.title = "When Idiocracy — " + total + "%";
    // Let the preview script know we're ready to screenshot.
    document.body.dataset.ready = "1";
  </script>
</body>
</html>
